name: Keep Render Server Alive

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Send a ping request to Render
        run: |
          for i in 1 2 3; do
            echo "Attempt $i"
            if curl -sSf -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" https://syncly-dtj3.onrender.com -o /dev/null; then
              echo "Success"
              exit 0
            fi
            echo "Failed, retrying in 10s..."
            sleep 10
          done
          echo "All attempts failed"
          exit 1
