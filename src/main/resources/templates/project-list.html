<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>프로젝트 목록 — WorkWith</title>
    <link rel="stylesheet" th:href="@{/css/portal.css}">
</head>
<body>
<div th:replace="~{fragments/layout :: header('projects')}"></div>

<div class="wrap">

    <!-- 검색 모드: 검색 결과 헤더 -->
    <div th:if="${searchQuery != null and !#strings.isEmpty(searchQuery)}"
         style="display:flex; align-items:center; gap:8px; margin-top:16px; margin-bottom:14px;">
        <h2 style="margin:0; font-size:16px; font-weight:800; color:var(--text);">검색 결과</h2>
        <span class="muted" style="font-size:13px;"
              th:text="|'${searchQuery}' — ${projects.size()}건|"></span>
        <a href="/projects" class="btn" style="font-size:11px; padding:4px 10px; margin-left:auto;">전체 목록으로</a>
    </div>

    <!-- 일반 모드: 타이틀 + 생성 버튼 + 필터 바 -->
    <th:block th:unless="${searchQuery != null and !#strings.isEmpty(searchQuery)}">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:16px; margin-bottom:14px;">
            <h2 style="margin:0; font-size:16px; font-weight:800; color:var(--text);">전체 프로젝트</h2>
            <button class="btn primary" style="font-size:12px;" onclick="openProjectModal()">+ 프로젝트 만들기</button>
        </div>
        <div class="filter-bar">
            <button class="filter-btn active" onclick="filterProjects('all', this)">전체</button>
            <button class="filter-btn" onclick="filterProjects('active', this)">진행중</button>
            <button class="filter-btn" onclick="filterProjects('done', this)">완료</button>
        </div>
    </th:block>

    <!-- 프로젝트 카드 그리드 -->
    <div id="projectGrid" class="project-grid">
        <div th:each="p : ${projects}"
             class="project-card"
             th:attr="data-status=${p.statusLabel}, data-id=${p.id}, data-joined=${p.joined}"
             th:style="${p.joined} ? 'cursor:pointer;' : 'cursor:not-allowed; opacity:0.7;'"
             onclick="goToProject(this)">
            <div class="pc-header">
                <span class="pc-title" th:text="${p.name}">프로젝트명</span>
                <span th:class="${p.statusLabel == 'done'} ? 'pill blue' : 'pill green'"
                      th:text="${p.statusBadge}">상태</span>
            </div>
            <div class="pc-desc" th:text="${p.description}">설명</div>
            <div class="pc-meta">
                <span th:text="|PM: ${p.ownerName}|">PM</span>
                <span th:text="|멤버 ${p.memberCount}명|">멤버</span>
                <span th:text="|마감: ${p.endDateLabel}|">마감</span>
            </div>
            <div class="pc-footer">
                <div class="pc-progress-bar">
                    <span th:style="|width:${p.progressRate}%|"
                          th:class="${p.progressRate == 100} ? 'done' : ''"></span>
                </div>
                <span class="muted" style="font-size:11px;" th:text="|${p.progressRate}%|">0%</span>
            </div>
            <div style="margin-top:10px; text-align:right;">
                <th:block th:if="${p.joined}">
                    <a th:href="@{/projects/{id}(id=${p.id})}" class="btn"
                       style="font-size:11px; padding:4px 10px;"
                       onclick="event.stopPropagation()">상세 보기</a>
                </th:block>
                <span th:unless="${p.joined}" class="muted" style="font-size:11px;">🔒 접근 권한 없음</span>
            </div>
        </div>
    </div>

    <div id="noResults" class="meta" style="display:none; text-align:center; padding:30px 0;">
        일치하는 프로젝트가 없습니다.
    </div>

    <div th:replace="~{fragments/layout :: footer}"></div>
</div>

<!-- 프로젝트 만들기 모달 (일반 모드 전용) -->
<th:block th:unless="${searchQuery != null and !#strings.isEmpty(searchQuery)}">
<div id="projectModal" class="modal-overlay" style="display:none;">
    <div class="modal-box">
        <div class="modal-hd">
            <span>새 프로젝트 만들기</span>
            <button class="modal-close" onclick="closeProjectModal()">✕</button>
        </div>
        <div class="modal-bd">
            <div class="field">
                <label>프로젝트 이름 <span style="color:var(--warn)">*</span></label>
                <input type="text" id="modalProjectName" placeholder="예: 2024 리뉴얼 프로젝트" autocomplete="off"/>
            </div>
            <div class="field">
                <label>설명</label>
                <input type="text" id="modalProjectDesc" placeholder="프로젝트 목적이나 범위를 간단히 입력하세요" autocomplete="off"/>
            </div>
            <div class="field">
                <label>기간</label>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
                    <div>
                        <label style="font-size:11px; color:var(--muted);">시작일</label>
                        <input type="date" id="modalStartDate"/>
                    </div>
                    <div>
                        <label style="font-size:11px; color:var(--muted);">마감일</label>
                        <input type="date" id="modalEndDate"/>
                    </div>
                </div>
            </div>
            <div class="field">
                <label>멤버 초대</label>
                <div th:replace="~{fragments/member-invite :: inviteField}"></div>
            </div>
        </div>
        <div class="modal-ft">
            <button class="btn" onclick="closeProjectModal()">취소</button>
            <button class="btn primary" onclick="submitProject()">프로젝트 생성</button>
        </div>
    </div>
</div>
</th:block>

<script>
    // ── 카드 클릭 (data-* 방식, 검색/일반 모드 공통) ──
    function goToProject(card) {
        const isJoined = card.dataset.joined === 'true';
        const id = card.dataset.id;
        if (!isJoined) {
            alert('이 프로젝트에 대한 접근 권한이 없습니다.');
            return;
        }
        window.location.href = '/projects/' + id;
    }

    // ── 필터 (일반 모드 전용) ──
    let currentFilter = 'all';
    function filterProjects(status, btn) {
        currentFilter = status;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        applyFilters();
    }
    function applyFilters() {
        const cards = document.querySelectorAll('.project-card');
        let visible = 0;
        cards.forEach(card => {
            const show = currentFilter === 'all' || card.dataset.status === currentFilter;
            card.style.display = show ? '' : 'none';
            if (show) visible++;
        });
        document.getElementById('noResults').style.display = visible === 0 ? '' : 'none';
    }

    // ── 모달 (일반 모드 전용) ──
    const inviteSelectedList = [];
    function openProjectModal() {
        document.getElementById('projectModal').style.display = 'flex';
        document.getElementById('modalStartDate').value = new Date().toLocaleDateString('en-CA');
        document.getElementById('modalProjectName').focus();
    }
    function closeProjectModal() {
        document.getElementById('modalProjectName').value = '';
        document.getElementById('modalProjectDesc').value = '';
        document.getElementById('modalStartDate').value = '';
        document.getElementById('modalEndDate').value = '';
        inviteSelectedList.length = 0;
        inviteRenderChips();
        const dd = document.getElementById('inviteDropdown');
        if (dd) dd.style.display = 'none';
        document.getElementById('projectModal').style.display = 'none';
    }
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && document.getElementById('projectModal').style.display !== 'none') {
            closeProjectModal();
        }
    });

    let inviteSearchTimer = null;
    function inviteSearchMembers(val) {
        clearTimeout(inviteSearchTimer);
        const dd = document.getElementById('inviteDropdown');
        if (!val.trim()) { dd.style.display = 'none'; return; }
        inviteSearchTimer = setTimeout(() => {
            fetch(`/api/members/search?q=${encodeURIComponent(val)}`)
                .then(r => r.json())
                .then(members => {
                    const filtered = members.filter(m => !inviteSelectedList.find(s => s.id === m.id));
                    dd.innerHTML = filtered.length === 0
                        ? '<div class="member-option muted" style="cursor:default;">검색 결과가 없습니다.</div>'
                        : filtered.map(m =>
                            `<div class="member-option" onclick="inviteAddMember(${m.id}, '${m.name}', '${m.email}')">${m.name} <span class="muted">${m.email}</span></div>`
                          ).join('');
                    dd.style.display = 'block';
                });
        }, 200);
    }
    function inviteAddMember(id, name, email) {
        if (inviteSelectedList.find(m => m.id === id)) return;
        inviteSelectedList.push({ id, name, email });
        inviteRenderChips();
        document.getElementById('inviteSearchInput').value = '';
        document.getElementById('inviteDropdown').style.display = 'none';
    }
    function inviteRemoveMember(id) {
        const idx = inviteSelectedList.findIndex(m => m.id === id);
        if (idx > -1) inviteSelectedList.splice(idx, 1);
        inviteRenderChips();
    }
    function inviteRenderChips() {
        document.getElementById('inviteChips').innerHTML = inviteSelectedList.map(m =>
            `<span class="member-tag">${m.name} <button onclick="inviteRemoveMember(${m.id})" class="tag-remove">✕</button></span>`
        ).join('');
    }
    document.addEventListener('click', e => {
        if (!e.target.closest('#inviteSearchInput') && !e.target.closest('#inviteDropdown')) {
            const dd = document.getElementById('inviteDropdown');
            if (dd) dd.style.display = 'none';
        }
    });
    function submitProject() {
        const name = document.getElementById('modalProjectName').value.trim();
        if (!name) { alert('프로젝트 이름을 입력하세요.'); return; }
        const description = document.getElementById('modalProjectDesc').value.trim();
        const startDate = document.getElementById('modalStartDate').value || null;
        const endDate = document.getElementById('modalEndDate').value || null;
        if (startDate && endDate && endDate < startDate) {
            alert('마감일은 시작일 이후여야 합니다.');
            return;
        }
        const invitedMemberIds = inviteSelectedList.map(m => m.id);
        fetch('/api/projects', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, description, startDate, endDate, invitedMemberIds })
        })
        .then(r => {
            if (!r.ok) throw new Error('프로젝트 생성에 실패했습니다.');
            return r.json();
        })
        .then(() => {
            closeProjectModal();
            window.location.reload();
        })
        .catch(e => alert(e.message));
    }
</script>
</body>
</html>
