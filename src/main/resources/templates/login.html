<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - WorkWith</title>
    <link rel="stylesheet" th:href="@{/css/portal.css}">
</head>
<body data-page="login">
<div th:replace="~{fragments/layout :: header('login')}"></div>

<div class="wrap">
    <div class="grid">
        <section class="panel">
            <div class="hd">환영합니다</div>
            <div class="bd">
                <div class="callout">
                    팀 협업툴 <b>WorkWith</b>에 오신 것을 환영합니다.<br>
                    프로젝트 검색, 이슈 보드, 위키, 알림을 한 곳에서 관리하세요.
                </div>
                <div class="field" style="margin-top:16px;">
                    <div class="muted">· 프로젝트 생성 및 멤버 초대</div>
                    <div class="muted">· 이슈 등록 및 우선순위 관리 (P0–P2)</div>
                    <div class="muted">· 마감일 기준 작업 정렬</div>
                    <div class="muted">· Slack 연동 알림</div>
                </div>
            </div>
        </section>

        <section class="panel">
            <div class="hd">로그인</div>
            <div class="bd">
                <p class="msg error" th:if="${param.error}">
                    로그인에 실패했습니다. 이메일 또는 비밀번호를 확인하세요.
                </p>
                <p class="msg error" th:if="${param.pending}">
                    승인 대기 중입니다.
                </p>
                <p class="msg ok" th:if="${param.logout}">
                    로그아웃되었습니다.
                </p>

                <form th:action="@{/login}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                    <div class="field">
                        <label for="email">이메일</label>
                        <input type="text" id="email" name="email" autocomplete="username" autofocus>
                    </div>

                    <div class="field">
                        <label for="password">비밀번호</label>
                        <input type="password" id="password" name="password" autocomplete="current-password"
                               oninput="blockKoreanPassword(this)">
                    </div>

                    <div class="actions">
                        <button class="btn primary" type="submit">로그인</button>
                        <a class="btn" th:href="@{/}">홈</a>
                    </div>
                    <div class="muted" style="margin-top:10px;">
                        아직 계정이 없으신가요? <a th:href="@{/signup}"><b>회원가입</b></a>
                    </div>
                </form>
            </div>
        </section>
    </div>

    <div th:replace="~{fragments/layout :: footer}"></div>
</div>
<script th:src="@{/js/portal.js}"></script>
<script>
    function blockKoreanPassword(input) {
        const KOREAN = /[가-힣ㄱ-ㅎㅏ-ㅣ]/g;
        if (KOREAN.test(input.value)) {
            input.value = input.value.replace(KOREAN, '');
        }
    }
</script>
</body>
</html>
