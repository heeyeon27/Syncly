<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<!--
  header(activePage) 파라미터
    'home'           → index 페이지 (로그인 상태 분기 + 검색 영역 포함)
    'projects'       → 프로젝트 목록 (로그인 상태 분기 + 검색 영역 포함)
    'project-detail' → 프로젝트 상세 (로그인 상태 분기 + 검색 영역 포함)
    'login'          → 로그인 페이지 (탭: 회원가입 | 로그인(active))
    'signup'         → 회원가입 페이지 (탭: 회원가입(active) | 로그인)
-->
<div th:fragment="header(activePage)" class="topbar">
    <div class="wrap">
        <div class="topbar-row">
            <div class="logo">
                <span class="mark" aria-hidden="true"></span>
                <a class="name" th:href="@{/}">WorkWith</a>
                <span class="tag">협업 · 프로젝트 · 이슈 관리</span>
            </div>

            <!-- Home / 프로젝트 페이지: 로그인 상태 분기 -->
            <th:block th:if="${activePage == 'home' or activePage == 'projects' or activePage == 'project-detail'}">
                <div class="auth" sec:authorize="isAnonymous()">
                    <span>환영합니다. 로그인이 필요합니다.</span>
                    <a class="btn ghost" th:href="@{/signup}">회원가입</a>
                    <a class="btn primary" th:href="@{/login}">로그인</a>
                </div>
                <div class="auth" sec:authorize="isAuthenticated()">
                    <span><b sec:authentication="name"></b> 님</span>
                    <form th:action="@{/logout}" method="post" style="margin:0;">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button class="btn" type="submit">로그아웃</button>
                    </form>
                </div>
            </th:block>

            <!-- Login / Signup: 탭 고정 순서 (회원가입 | 로그인) -->
            <nav th:if="${activePage == 'login' or activePage == 'signup'}" class="auth-tabs">
                <a th:class="${activePage == 'signup'} ? 'tab active' : 'tab'"
                   th:href="@{/signup}">회원가입</a>
                <a th:class="${activePage == 'login'} ? 'tab active' : 'tab'"
                   th:href="@{/login}">로그인</a>
            </nav>
        </div>

        <!-- 검색 영역: home / 프로젝트 페이지 공통 -->
        <th:block th:if="${activePage == 'home' or activePage == 'projects' or activePage == 'project-detail'}">
            <form class="search" th:action="@{/}" method="get">
                <input type="text" name="q" th:value="${param.q}"
                       placeholder="프로젝트 검색 (예: 기획, 백로그, sprint, 디자인)"
                       autocomplete="off"/>
                <button class="btn primary" type="submit">검색</button>
            </form>
            <div class="hint">
                <span th:if="${param.q}">검색어: <b th:text="${param.q}">q</b> — 전체 프로젝트 기준</span>
                <span th:unless="${param.q}">프로젝트 이름으로 검색하세요.</span>
            </div>
            <div class="search-results" th:if="${searchResults != null}">
                <div th:if="${#lists.isEmpty(searchResults)}" class="meta" style="padding:6px 0;">
                    일치하는 프로젝트가 없습니다.
                </div>
                <div th:each="p : ${searchResults}" class="search-result-item">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <b th:text="${p.name}">프로젝트명</b>
                        <span th:if="${memberProjectIds.contains(p.id)}" class="pill green">접근 가능</span>
                        <span th:unless="${memberProjectIds.contains(p.id)}" class="pill">비공개</span>
                    </div>
                    <div class="meta" th:text="${p.description != null ? p.description : '요약 없음'}">요약</div>
                    <div class="meta" th:text="'등록일: ' + ${#temporals.format(p.createdAt, 'yyyy-MM-dd')}">날짜</div>
                    <div th:unless="${memberProjectIds.contains(p.id)}" class="no-access">
                        이 프로젝트에 대한 접근 권한이 없습니다.
                    </div>
                </div>
            </div>
        </th:block>
    </div>
</div>

<div th:fragment="footer" class="foot">© WorkWith</div>

</body>
</html>
